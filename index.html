<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Acenda uma vela virtual para iluminar e abençoar a semana"
    />
    <title>Eduarda Ferreira • Luz e Inspiração</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/candle.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>

  <body>
    <div class="background" aria-hidden="true">
      <div class="background__halo background__halo--primary"></div>
      <div class="background__halo background__halo--secondary"></div>
      <div class="background__dust">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div id="particles"></div>

    <main class="container">
      <header class="hero">
        <h1>Eduarda Ferreira</h1>
        <p>Uma chama para iluminar e abençoar esta semana.</p>
      </header>

      <section class="memorial">
        <div class="light"></div>

        <div class="candle" role="button" tabindex="0" aria-label="Acender vela">
          <div class="flame"></div>
          <div class="wick"></div>
          <div class="wax"></div>
          <div class="base"></div>
          <div class="smoke"></div>
        </div>
      </section>

      <section class="status">
        <h2 id="statusTitle">A vela está apagada</h2>
        <p id="statusText"></p>
      </section>

      <section class="message-area">
        <textarea id="message" maxlength="250"></textarea>
        <span id="counter">0 / 250</span>
      </section>

      <section class="buttons">
        <button id="btnLight" class="primary">✨ Acender Vela</button>
        <button id="btnOff" class="secondary">🌼 Apagar</button>
      </section>

      <section id="tribute" class="tribute hidden">
        <p id="tributeText"></p>
      </section>

      <section id="timer" class="timer hidden">
        <span>Tempo da vela acesa</span>
        <strong id="time">00:00</strong>
      </section>
    </main>

    <footer>
      <p>
        Desenvolvido para abençoar
        <strong>Eduarda Ferreira</strong>
      </p>
    </footer>

    <script src="js/candle.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>

<audio id="bg-sound" loop>
  <source src="audio/ambiente.mp3" type="audio/mp3" />
</audio>
